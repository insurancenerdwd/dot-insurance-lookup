<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOT Insurance Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    header {
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f3460;
    }
    header p {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }
    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      max-width: 320px;
    }
    .search-bar input:focus { border-color: #0f3460; }
    .search-bar button {
      padding: 12px 24px;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: #16213e; }
    .search-bar button:disabled { background: #9ca3af; cursor: not-allowed; }

    .status {
      text-align: center;
      padding: 48px;
      color: #6b7280;
      font-size: 0.95rem;
    }
    .status.error { color: #dc2626; }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #d1d5db;
      border-top-color: #0f3460;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 16px;
    }

    /* Company info grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .info-item label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }
    .info-item span {
      font-size: 0.95rem;
      color: #111827;
    }
    .info-item span.empty { color: #9ca3af; font-style: italic; }

    /* Status badge */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-active { background: #dcfce7; color: #15803d; }
    .badge-inactive { background: #fee2e2; color: #b91c1c; }
    .badge-other { background: #f3f4f6; color: #4b5563; }

    /* Insurance table */
    .ins-table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      border-bottom: 2px solid #e5e7eb;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f3f4f6; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9fafb; }
    tbody td { padding: 10px 12px; vertical-align: top; }
    tbody td.mono { font-family: ui-monospace, monospace; font-size: 0.82rem; }

    .ins-type-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .row-active td { background: #f0fdf4; }
    .row-replaced td { color: #6b7280; }

    .status-active {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
      background: #dcfce7;
      color: #15803d;
    }
    .status-replaced {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #f3f4f6;
      color: #6b7280;
    }

    .no-ins {
      text-align: center;
      padding: 24px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .docket-label {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .docket-label strong { color: #374151; }

    /* Risk / crash section */
    .risk-summary {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .stat-box {
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
    }
    .stat-box .stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f3460;
      line-height: 1;
    }
    .stat-box .stat-val.danger { color: #dc2626; }
    .stat-box .stat-val.warn   { color: #d97706; }
    .stat-box .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      margin-top: 5px;
    }
    .risk-tier-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .risk-tier-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #9ca3af;
    }
    .risk-tier {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .risk-low      { background: #dcfce7; color: #15803d; }
    .risk-medium   { background: #fef9c3; color: #854d0e; }
    .risk-high     { background: #ffedd5; color: #c2410c; }
    .risk-critical { background: #fee2e2; color: #991b1b; }
    .risk-rate {
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
    }
    .section-subtitle {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin: 18px 0 10px;
    }
    .danger-text { color: #dc2626; font-weight: 700; }
    .cap-note { font-size: 0.78rem; color: #9ca3af; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>DOT Insurance Lookup</h1>
    <p>Enter a USDOT number to retrieve carrier information and active insurance policies from FMCSA.</p>
  </header>

  <div class="search-bar">
    <input type="text" id="dotInput" placeholder="Enter DOT number (e.g. 3210270)"
           inputmode="numeric" pattern="[0-9]*" />
    <button id="searchBtn" onclick="runLookup()">Look Up</button>
  </div>

  <div id="results">
    <div class="status">Enter a DOT number above to begin.</div>
  </div>
</div>

<script>
  // Optional: paste your Socrata app token here to avoid rate limits
  const APP_TOKEN = '';

  const CENSUS_URL   = 'https://data.transportation.gov/resource/az4n-8mr2.json';
  const INSUR_URL    = 'https://data.transportation.gov/resource/ypjt-5ydn.json';
  const INSHIST_URL  = 'https://data.transportation.gov/resource/6sqe-dvqs.json';
  const CRASH_URL    = 'https://data.transportation.gov/resource/aayw-vxb3.json';

  const RISK_WINDOW_YEARS = 3;

  // ins_type_code is a numeric string from the FMCSA dataset
  const INS_TYPE_LABELS = {
    '1': 'BIPD / Primary',
    '2': 'Cargo',
    '3': 'Bond',
    '4': 'Public Liability',
    '5': 'Excess / Umbrella',
    '6': 'Household Goods',
  };

  function qs(params) {
    const p = new URLSearchParams(params);
    if (APP_TOKEN) p.set('$$app_token', APP_TOKEN);
    return p.toString();
  }

  async function apiFetch(base, params) {
    const res = await fetch(`${base}?${qs(params)}`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
  }

  function fmt(val) {
    if (!val || val.trim() === '') return '<span class="empty">—</span>';
    return val;
  }

  function fmtMoney(val) {
    if (!val || val.trim() === '') return '<span class="empty">—</span>';
    const n = parseFloat(val);
    if (isNaN(n)) return val;
    // FMCSA stores amounts in thousands (e.g. "01000" = $1,000,000)
    return '$' + (n * 1000).toLocaleString('en-US');
  }

  function fmtDate(val) {
    if (!val || val.trim() === '') return '<span class="empty">—</span>';
    // Dates come as "YYYY-MM-DDT..." or "MM/DD/YYYY"
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function statusBadge(code) {
    if (!code) return '';
    const c = code.toUpperCase();
    if (c === 'A') return '<span class="badge badge-active">Active</span>';
    if (c === 'I') return '<span class="badge badge-inactive">Inactive</span>';
    return `<span class="badge badge-other">${code}</span>`;
  }

  // report_date is stored as YYYYMMDD text
  function parseCrashDate(s) {
    if (!s || s.length < 8) return null;
    const d = new Date(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`);
    return isNaN(d) ? null : d;
  }

  function fmtCrashDate(s) {
    const d = parseCrashDate(s);
    if (!d) return s || '—';
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function calcRiskTier(recentCrashes) {
    const hasFatal  = recentCrashes.some(r => parseInt(r.fatalities || 0) > 0);
    const hasHazmat = recentCrashes.some(r => r.hazmat_released === 'Y');
    const fedRec    = recentCrashes.filter(r => r.federal_recordable === 'Y').length;
    if (hasFatal || hasHazmat) return 'critical';
    if (fedRec >= 3) return 'high';
    if (fedRec >= 1) return 'medium';
    return 'low';
  }

  function renderCrash(crashes, powerUnits) {
    const cutoff = new Date();
    cutoff.setFullYear(cutoff.getFullYear() - RISK_WINDOW_YEARS);

    const recent = crashes.filter(r => {
      const d = parseCrashDate(r.report_date);
      return d && d >= cutoff;
    });

    const totalFatalities = crashes.reduce((s, r) => s + (parseInt(r.fatalities) || 0), 0);
    const totalInjuries   = crashes.reduce((s, r) => s + (parseInt(r.injuries)   || 0), 0);
    const totalFedRec     = crashes.filter(r => r.federal_recordable === 'Y').length;
    const recentFedRec    = recent.filter(r => r.federal_recordable === 'Y').length;
    const recentFatal     = recent.reduce((s, r) => s + (parseInt(r.fatalities) || 0), 0);

    const tier = calcRiskTier(recent);
    const tierLabels = { low: 'Low Risk', medium: 'Medium Risk', high: 'High Risk', critical: 'Critical Risk' };

    const pu = parseInt(powerUnits) || 0;
    const rateHtml = pu > 0
      ? `<div class="risk-rate">${recentFedRec} recordable / ${pu} units<br>(${((recentFedRec / pu) * 10).toFixed(2)} per 10 units)</div>`
      : '';

    const crashRows = recent.slice(0, 30).map(r => {
      const fatalNum = parseInt(r.fatalities) || 0;
      const injNum   = parseInt(r.injuries)   || 0;
      return `
        <tr>
          <td>${fmtCrashDate(r.report_date)}</td>
          <td>${r.report_state || '—'}</td>
          <td>${r.city || '—'}</td>
          <td class="${fatalNum > 0 ? 'danger-text' : ''}">${fatalNum}</td>
          <td>${injNum}</td>
          <td>${r.tow_away === 'Y' ? '✓' : '—'}</td>
          <td>${r.federal_recordable === 'Y' ? '<span class="badge badge-inactive" style="font-size:0.7rem">Yes</span>' : '—'}</td>
          <td>${r.hazmat_released === 'Y' ? '<span class="badge badge-inactive" style="font-size:0.7rem">HM</span>' : '—'}</td>
        </tr>`;
    }).join('');

    const tableHtml = recent.length > 0
      ? `<div class="section-subtitle">${RISK_WINDOW_YEARS}-Year Crash Detail (${recent.length} incident${recent.length !== 1 ? 's' : ''})</div>
         <div class="ins-table-wrap"><table>
           <thead><tr>
             <th>Date</th><th>State</th><th>City</th>
             <th>Fatalities</th><th>Injuries</th><th>Tow-Away</th>
             <th>Fed. Recordable</th><th>Hazmat</th>
           </tr></thead>
           <tbody>${crashRows}</tbody>
         </table></div>
         ${recent.length > 30 ? `<div class="cap-note">Showing 30 of ${recent.length} crashes in window</div>` : ''}`
      : `<div class="no-ins">No crashes on record in the last ${RISK_WINDOW_YEARS} years.</div>`;

    const capNote = crashes.length >= 500
      ? `<div class="cap-note" style="margin-bottom:12px">Showing most recent 500 records — carrier may have additional history</div>`
      : '';

    return `
      <div class="card">
        <div class="card-title">Safety &amp; Crash History</div>
        ${capNote}
        <div class="risk-summary">
          <div class="stat-row">
            <div class="stat-box">
              <div class="stat-val">${crashes.length}</div>
              <div class="stat-label">Crashes on File</div>
            </div>
            <div class="stat-box">
              <div class="stat-val ${totalFatalities > 0 ? 'danger' : ''}">${totalFatalities}</div>
              <div class="stat-label">Total Fatalities</div>
            </div>
            <div class="stat-box">
              <div class="stat-val ${totalInjuries > 0 ? 'warn' : ''}">${totalInjuries}</div>
              <div class="stat-label">Total Injuries</div>
            </div>
            <div class="stat-box">
              <div class="stat-val">${totalFedRec}</div>
              <div class="stat-label">Fed. Recordable</div>
            </div>
            <div class="stat-box">
              <div class="stat-val ${recentFatal > 0 ? 'danger' : ''}">${recentFedRec}</div>
              <div class="stat-label">${RISK_WINDOW_YEARS}-yr Recordable</div>
            </div>
          </div>
          <div class="risk-tier-wrap">
            <div class="risk-tier-label">${RISK_WINDOW_YEARS}-yr Assessment</div>
            <div class="risk-tier risk-${tier}">${tierLabels[tier]}</div>
            ${rateHtml}
          </div>
        </div>
        ${tableHtml}
      </div>`;
  }

  function buildDockets(row) {
    const dockets = [];
    for (let i = 1; i <= 3; i++) {
      const prefix = (row[`docket${i}prefix`] || '').trim();
      const num    = (row[`docket${i}`] || '').trim();
      if (prefix && num) dockets.push(prefix + num.padStart(6, '0'));
    }
    return dockets;
  }

  function renderCompany(row) {
    const name    = row.legal_name || '';
    const dba     = row.dba_name   || '';
    const street  = row.phy_street || '';
    const city    = row.phy_city   || '';
    const state   = row.phy_state  || '';
    const zip     = row.phy_zip    || '';
    const addr    = [street, city && state ? `${city}, ${state}` : city || state, zip]
                      .filter(Boolean).join(' ');

    return `
      <div class="card">
        <div class="card-title">Carrier Information</div>
        <div class="info-grid">
          <div class="info-item">
            <label>DOT Number</label>
            <span>${fmt(row.dot_number)}</span>
          </div>
          <div class="info-item">
            <label>Legal Name</label>
            <span>${fmt(name)}</span>
          </div>
          ${dba ? `<div class="info-item"><label>DBA</label><span>${dba}</span></div>` : ''}
          <div class="info-item">
            <label>Status</label>
            <span>${statusBadge(row.status_code)}</span>
          </div>
          <div class="info-item">
            <label>Physical Address</label>
            <span>${fmt(addr)}</span>
          </div>
          <div class="info-item">
            <label>Phone</label>
            <span>${fmt(row.phone)}</span>
          </div>
          <div class="info-item">
            <label>Entity Type</label>
            <span>${fmt(row.business_org_desc || row.business_org_id)}</span>
          </div>
          <div class="info-item">
            <label>Power Units</label>
            <span>${fmt(row.power_units)}</span>
          </div>
          <div class="info-item">
            <label>Drivers</label>
            <span>${fmt(row.total_drivers)}</span>
          </div>
        </div>
      </div>`;
  }

  // Normalize active policy record (from ypjt-5ydn) into common shape
  function normalizeActive(r) {
    return {
      form_code:      r.ins_form_code || '',
      type_label:     INS_TYPE_LABELS[r.ins_type_code] || r.ins_type_code || '—',
      insurer:        r.name_company || '',
      policy_no:      r.policy_no || '',
      cov_from:       fmtMoney(r.underl_lim_amount),
      cov_to:         fmtMoney(r.max_cov_amount),
      eff_from:       r.effective_date || '',
      eff_to:         null,
      status:         'active',
    };
  }

  // Normalize historical/cancelled record (from 6sqe-dvqs) into common shape
  function normalizeHistory(r) {
    return {
      form_code:      r.ins_form_code || '',
      type_label:     r.mod_col_3 || '—',
      insurer:        r.name_company || '',
      policy_no:      r.policy_no || '',
      cov_from:       fmtMoney(r.mod_col_4),
      cov_to:         fmtMoney(r.mod_col_5),
      eff_from:       r.effective_date || '',
      eff_to:         r.cancl_effective_date || '',
      status:         (r.cancl_method === 'TERM/REPL' || r.mod_col_1 === 'Replaced') ? 'replaced' : 'cancelled',
    };
  }

  function renderInsurance(dockets, active, history) {
    const docketDisplay = dockets.join(', ');

    const normalized = [
      ...active.map(normalizeActive),
      ...history.map(normalizeHistory),
    ].sort((a, b) => new Date(b.eff_from || 0) - new Date(a.eff_from || 0));

    const rows = normalized.map(r => {
      const isActive  = r.status === 'active';
      const rowClass  = isActive ? 'row-active' : 'row-replaced';
      const statusHtml = isActive
        ? '<span class="status-active">Active</span>'
        : r.status === 'replaced'
          ? '<span class="status-replaced">Replaced</span>'
          : '<span class="status-replaced">Cancelled</span>';
      const effToHtml = isActive
        ? '<span style="color:#15803d;font-weight:600">Active</span>'
        : fmtDate(r.eff_to);

      return `
        <tr class="${rowClass}">
          <td>${r.form_code || '—'}</td>
          <td>${r.type_label}</td>
          <td>${fmt(r.insurer)}</td>
          <td class="mono">${fmt(r.policy_no)}</td>
          <td>${r.cov_from}</td>
          <td>${r.cov_to}</td>
          <td>${fmtDate(r.eff_from)}</td>
          <td>${effToHtml}</td>
          <td>${statusHtml}</td>
        </tr>`;
    }).join('');

    const body = rows
      ? `<div class="ins-table-wrap"><table>
           <thead>
             <tr>
               <th>Form</th>
               <th>Type</th>
               <th>Insurance Carrier</th>
               <th>Policy / Surety</th>
               <th>Coverage From</th>
               <th>Coverage To</th>
               <th>Eff. Date From</th>
               <th>Eff. Date To</th>
               <th>Status</th>
             </tr>
           </thead>
           <tbody>${rows}</tbody>
         </table></div>`
      : `<div class="no-ins">No insurance records found for docket(s): ${docketDisplay}</div>`;

    return `
      <div class="card">
        <div class="card-title">Insurance Policies</div>
        <div class="docket-label">Docket(s): <strong>${docketDisplay || '—'}</strong></div>
        ${body}
      </div>`;
  }

  async function runLookup() {
    const input = document.getElementById('dotInput');
    const btn   = document.getElementById('searchBtn');
    const dot   = input.value.trim().replace(/\D/g, '');

    if (!dot) {
      setResults('<div class="status error">Please enter a valid DOT number.</div>');
      return;
    }

    btn.disabled = true;
    setResults('<div class="status"><span class="spinner"></span>Looking up DOT ' + dot + '…</div>');

    try {
      // Step 1: census lookup
      const companies = await apiFetch(CENSUS_URL, { dot_number: dot, '$limit': 5 });

      if (!companies.length) {
        setResults(`<div class="status error">No carrier found for DOT number <strong>${dot}</strong>. Verify the number and try again.</div>`);
        return;
      }

      const company = companies[0];
      const dockets = buildDockets(company);

      // Start crash fetch immediately — uses dot_number, no dockets needed
      const crashPromise = apiFetch(CRASH_URL, {
        dot_number: dot,
        '$limit': 500,
        '$order': 'report_date DESC',
      }).catch(() => []);

      let activeRecords = [];
      let historyRecords = [];

      if (dockets.length) {
        // Try padded format first (MC020645), fall back to unpadded (MC20645) if no results
        const fetchInsurance = async (d) => {
          const m = String(d).toUpperCase().match(/^([A-Z]+)-?0*(\d+)$/);
          const formats = m ? [m[1] + m[2].padStart(6,'0'), m[1] + m[2]] : [d];
          for (const fmt of formats) {
            const rows = await apiFetch(INSUR_URL, { prefix_docket_number: fmt, '$limit': 50 }).catch(() => []);
            if (rows.length) return rows;
          }
          return [];
        };
        const fetchHistory = async (d) => {
          const m = String(d).toUpperCase().match(/^([A-Z]+)-?0*(\d+)$/);
          const formats = m ? [m[1] + m[2].padStart(6,'0'), m[1] + m[2]] : [d];
          for (const fmt of formats) {
            const rows = await apiFetch(INSHIST_URL, { docket_number: fmt, '$limit': 200, '$order': 'effective_date DESC' }).catch(() => []);
            if (rows.length) return rows;
          }
          return [];
        };

        const activePromises  = dockets.map(d => fetchInsurance(d));
        const historyPromises = dockets.map(d => fetchHistory(d));

        const [activeResults, historyResults] = await Promise.all([
          Promise.all(activePromises),
          Promise.all(historyPromises),
        ]);

        activeRecords  = activeResults.flat();
        historyRecords = historyResults.flat();

        // Deduplicate active records by policy_no
        const dedupActive = (arr) => {
          const seen = new Set();
          return arr.filter(r => {
            if (seen.has(r.policy_no)) return false;
            seen.add(r.policy_no);
            return true;
          });
        };
        activeRecords = dedupActive(activeRecords);

        // Deduplicate history by (policy_no + effective_date), preferring TERM/REPL over TERM/CANCL
        const histMap = new Map();
        historyRecords.forEach(r => {
          const key = `${r.policy_no}|${r.effective_date}`;
          const existing = histMap.get(key);
          if (!existing) {
            histMap.set(key, r);
          } else if (r.cancl_method === 'TERM/REPL' && existing.cancl_method !== 'TERM/REPL') {
            histMap.set(key, r);
          }
        });
        historyRecords = Array.from(histMap.values());

        // Drop any history record that duplicates an active policy number
        const activePolicies = new Set(activeRecords.map(r => r.policy_no));
        historyRecords = historyRecords.filter(r => !activePolicies.has(r.policy_no));
      }

      const crashRecords = await crashPromise;

      setResults(
        renderCompany(company) +
        renderCrash(crashRecords, company.power_units) +
        renderInsurance(dockets, activeRecords, historyRecords)
      );

    } catch (err) {
      setResults(`<div class="status error">Error: ${err.message}</div>`);
    } finally {
      btn.disabled = false;
    }
  }

  function setResults(html) {
    document.getElementById('results').innerHTML = html;
  }

  // Allow Enter key to trigger search
  document.getElementById('dotInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runLookup();
  });
</script>
</body>
</html>
